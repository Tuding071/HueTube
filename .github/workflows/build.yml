name: Build HueTube

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set Android SDK path
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      - name: Generate project structure
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          PKG=app/src/main/java/com/huetube/app
          mkdir -p $PKG
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          cp HT.kt $PKG/

          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "HueTube"
          include(":app")
          EOF

          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")             version "8.9.1" apply false
              id("org.jetbrains.kotlin.android")        version "2.2.0" apply false
              id("org.jetbrains.kotlin.plugin.compose") version "2.2.0" apply false
          }
          EOF

          cat > app/build.gradle.kts << EOF
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("org.jetbrains.kotlin.plugin.compose")
          }

          android {
              namespace  = "com.huetube.app"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.huetube.app"
                  minSdk        = 26
                  targetSdk     = 36
                  versionCode   = ${BUILD_NUMBER}
                  versionName   = "${BUILD_NUMBER}"
              }

              signingConfigs {
                  create("release") {
                      storeFile     = file("dummy.keystore")
                      storePassword = "password"
                      keyAlias      = "dummy"
                      keyPassword   = "password"
                  }
              }

              buildTypes {
                  release {
                      isMinifyEnabled = true
                      isShrinkResources = true
                      signingConfig  = signingConfigs.getByName("release")
                      proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
              buildFeatures { compose = true }

              splits {
                  abi {
                      isEnable       = true
                      reset()
                      include("arm64-v8a")
                      isUniversalApk = false
                  }
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.15.0")
              implementation("androidx.activity:activity-compose:1.10.1")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.9.0")

              val bom = platform("androidx.compose:compose-bom:2025.05.00")
              implementation(bom)
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")
              implementation("androidx.compose.animation:animation")
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC
          kotlin.code.style=official
          android.suppressUnsupportedCompileSdk=36
          EOF

          cat > app/proguard-rules.pro << 'EOF'
          -keep class androidx.compose.** { *; }
          -keepclassmembers class * {
              @androidx.compose.runtime.Composable <methods>;
          }
          -keep class kotlin.** { *; }
          -keepclassmembers class kotlin.Metadata {
              public <methods>;
          }
          -keep class android.webkit.** { *; }
          -optimizations !code/simplification/arithmetic,!code/simplification/cast,!field/*,!class/merging/*
          -optimizationpasses 5
          -dontusemixedcaseclassnames
          -dontskipnonpubliclibraryclasses
          -verbose
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="false"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@style/AppTheme"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustPan">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">HueTube</string></resources>
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">#0A0A0A</item>
                  <item name="android:statusBarColor">#0A0A0A</item>
                  <item name="android:navigationBarColor">#0A0A0A</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          EOF

      - name: Generate dummy keystore
        run: |
          keytool -genkey -v \
            -keystore app/dummy.keystore \
            -alias dummy \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password \
            -keypass password \
            -dname "CN=Dummy, OU=HueTube, O=HueTube, L=Test, S=Test, C=US"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pillow-v1

      - name: Generate launcher icons
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import os, math

          def make_icon(size):
              BG = (10, 10, 10, 255)

              img = Image.new('RGBA', (size, size), BG)
              d = ImageDraw.Draw(img)

              # Red to cyan gradient (diagonal)
              for y in range(size):
                  for x in range(size):
                      t = (x + y) / (2 * size)
                      r = int(220 + (0 - 220) * t)
                      g = int(20 + (200 - 20) * t)
                      b = int(20 + (200 - 20) * t)
                      d.point((x, y), fill=(max(0, min(255, r)), max(0, min(255, g)), max(0, min(255, b)), 255))

              # White play triangle (rotated 90° to point right)
              cx, cy = size / 2, size / 2
              tri_size = size * 0.28
              # Triangle pointing right
              pts = [
                  (cx - tri_size * 0.55, cy - tri_size),
                  (cx - tri_size * 0.55, cy + tri_size),
                  (cx + tri_size * 0.7, cy)
              ]
              d.polygon(pts, fill=(255, 255, 255, 255))

              return img

          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for density, s in sizes.items():
              path = f'app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              icon = make_icon(s)
              icon.save(f'{path}/ic_launcher.png')
              icon.save(f'{path}/ic_launcher_round.png')

          print("Icons done.")
          PYEOF

      - name: Create Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signing
        run: |
          APK_PATH="app/build/outputs/apk/release/app-arm64-v8a-release.apk"
          if [ -f "$APK_PATH" ]; then
              echo "✅ Release APK generated"
              echo "📦 APK size: $(ls -lh "$APK_PATH" | awk '{print $5}')"
              $ANDROID_HOME/build-tools/36.0.0/apksigner verify --print-certs "$APK_PATH"
          else
              echo "❌ Release APK not found"
              exit 1
          fi

      - name: Bundle release
        run: |
          mkdir -p HueTube-release/.github/workflows
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk HueTube-release/HueTube.apk
          cp HT.kt HueTube-release/
          cp .github/workflows/build.yml HueTube-release/.github/workflows/

          APK_SIZE=$(ls -lh app/build/outputs/apk/release/app-arm64-v8a-release.apk | awk '{print $5}')

          cat > HueTube-release/BUILD_INFO.txt << EOF
          Build:      #${{ github.run_number }}
          Commit:     ${{ github.sha }}
          Timestamp:  $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Signed:     Yes (dummy keys)
          APK Size:   $APK_SIZE
          Optimized:  Yes (R8 + resource shrinking)
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HueTube-${{ github.run_number }}
          path: HueTube-release/
          retention-days: 30
